apiVersion: v1
kind: Pod
metadata:
  name: demo-pod
spec:
  containers:
    - name: web
      image: docker.io/library/nginx:alpine
      ports:
        - containerPort: 80
          hostPort: 8092
    - name: client
      image: docker.io/library/busybox
      command:
        - sh
        - -c
        - sleep 3600
